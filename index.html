<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocky + Mimi Image Edit Api</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@400;600;700&display=swap');

  * { box-sizing: border-box; }

  :root {
    --pink-1: #ffd6e8;
    --pink-2: #ffb3d1;
    --pink-3: #ff8fc7;
    --pink-deep: #d6437e;
    --cream: #fff5fa;
    --ink: #5a2745;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(160deg, var(--pink-1), var(--pink-2) 45%, var(--pink-3));
    overflow-x: hidden;
    color: var(--ink);
    position: relative;
  }

  /* ---------- Floating emoji background ---------- */
  .emoji-field {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .floaty {
    position: absolute;
    bottom: -10%;
    font-size: 28px;
    opacity: 0.85;
    animation: rise linear infinite;
    filter: drop-shadow(0 2px 6px rgba(214,67,126,0.25));
  }
  @keyframes rise {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.9; }
    50%  { transform: translateY(-55vh) translateX(15px) rotate(15deg); }
    90%  { opacity: 0.9; }
    100% { transform: translateY(-115vh) translateX(-15px) rotate(-10deg); opacity: 0; }
  }

  /* ---------- Header ---------- */
  .wrap {
    position: relative;
    z-index: 2;
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    text-align: center;
  }

  .logo {
    width: 118px;
    height: 118px;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid #fff;
    box-shadow: 0 8px 24px rgba(214,67,126,0.35), 0 0 0 6px rgba(255,255,255,0.5);
    animation: bob 3.2s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50%      { transform: translateY(-10px) rotate(2deg); }
  }

  .title {
    margin: 22px 0 6px;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: clamp(1.6rem, 6vw, 2.6rem);
    display: inline-flex;
    align-items: center;
    gap: 14px;
    color: var(--pink-deep);
    text-shadow: 2px 2px 0 #fff, 0 4px 14px rgba(214,67,126,0.35);
  }
  .title .heart {
    display: inline-block;
    animation: heartbeat 1.4s ease-in-out infinite;
    font-size: 0.85em;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    25%      { transform: scale(1.25); }
    40%      { transform: scale(0.95); }
    55%      { transform: scale(1.2); }
  }

  .title-text {
    background: linear-gradient(90deg, #ff5fa2, #d6437e, #ff8fc7, #ff5fa2);
    background-size: 300% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 4s linear infinite;
  }
  @keyframes shimmer {
    to { background-position: 300% center; }
  }

  .subtitle {
    color: var(--pink-deep);
    opacity: 0.85;
    font-weight: 600;
    margin-bottom: 34px;
  }

  /* ---------- Card ---------- */
  .card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(6px);
    border: 2px solid #ffffffaa;
    border-radius: 28px;
    padding: 28px 24px;
    box-shadow: 0 12px 40px rgba(214,67,126,0.22);
    text-align: left;
  }

  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    justify-content: center;
  }
  .tab-btn {
    border: none;
    background: #ffffffaa;
    color: var(--pink-deep);
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 999px;
    cursor: pointer;
    transition: all .2s ease;
  }
  .tab-btn.active {
    background: linear-gradient(90deg, #ff8fc7, #ff5fa2);
    color: #fff;
    box-shadow: 0 6px 16px rgba(214,67,126,0.35);
  }

  label {
    display: block;
    font-weight: 700;
    color: var(--pink-deep);
    margin: 14px 0 6px;
  }

  input[type="text"], textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: 14px;
    border: 2px solid #ffd6e8;
    font-family: 'Quicksand', sans-serif;
    font-size: 1rem;
    outline: none;
    background: #fff;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--pink-3); }

  .dropzone {
    border: 2.5px dashed var(--pink-3);
    border-radius: 16px;
    padding: 22px;
    text-align: center;
    color: var(--pink-deep);
    font-weight: 600;
    cursor: pointer;
    background: #fff8fb;
    transition: background .2s;
  }
  .dropzone:hover { background: #ffeef6; }
  .dropzone img { max-width: 100%; max-height: 180px; border-radius: 12px; margin-top: 10px; }

  .go-btn {
    margin-top: 20px;
    width: 100%;
    border: none;
    padding: 14px;
    border-radius: 16px;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    color: #fff;
    background: linear-gradient(90deg, #ff5fa2, #d6437e);
    box-shadow: 0 8px 20px rgba(214,67,126,0.4);
    cursor: pointer;
    transition: transform .15s ease;
  }
  .go-btn:hover { transform: translateY(-2px); }
  .go-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .result {
    margin-top: 22px;
    text-align: center;
  }
  .result img {
    max-width: 100%;
    border-radius: 16px;
    box-shadow: 0 10px 28px rgba(214,67,126,0.3);
  }
  .status {
    margin-top: 14px;
    font-weight: 700;
    color: var(--pink-deep);
    min-height: 1.2em;
  }

  .hidden { display: none !important; }

  footer {
    margin-top: 30px;
    font-size: 0.85rem;
    color: var(--pink-deep);
    opacity: 0.7;
  }
</style>
</head>
<body>

<div class="emoji-field" id="emojiField"></div>

<div class="wrap">
  <img class="logo" src="https://i.imgur.com/KHvQMen.jpeg" alt="Rocky + Mimi logo">

  <h1 class="title">
    <span class="heart">💌</span>
    <span class="title-text">Rocky + Mimi Image Edit Api</span>
    <span class="heart">💌</span>
  </h1>
  <p class="subtitle">✨ made with love — edit or create photos with AI ✨</p>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" data-tab="edit">🖼️ Edit Photo</button>
      <button class="tab-btn" data-tab="generate">🌸 Generate Photo</button>
    </div>

    <!-- EDIT TAB -->
    <div id="edit-tab">
      <label>Upload a photo</label>
      <div class="dropzone" id="dropzone">
        <span id="dropzoneText">📷 Tap to choose a photo</span>
        <input type="file" id="fileInput" accept="image/*" class="hidden">
      </div>

      <label>What should change?</label>
      <input type="text" id="editPrompt" placeholder="e.g. add sunglasses and pink hair">

      <button class="go-btn" id="editBtn">💖 Edit my photo</button>
    </div>

    <!-- GENERATE TAB -->
    <div id="generate-tab" class="hidden">
      <label>Describe the image you want</label>
      <textarea id="genPrompt" rows="3" placeholder="e.g. a cute kitten wearing a pink bow, dreamy background"></textarea>
      <button class="go-btn" id="genBtn">🌸 Generate image</button>
    </div>

    <div class="status" id="status"></div>
    <div class="result hidden" id="resultBox">
      <img id="resultImg" alt="result">
    </div>
  </div>

  <footer>Rocky + Mimi Image Edit Api · powered by your own engine 💕</footer>
</div>

<script>
  // ---------- floating cute emoji background ----------
  const emojis = ["💖","✨","🌸","💌","🎀","🧸","🍬","💗","🌷","⭐"];
  const field = document.getElementById('emojiField');
  const COUNT = 22;
  for (let i = 0; i < COUNT; i++) {
    const el = document.createElement('div');
    el.className = 'floaty';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (18 + Math.random() * 26) + 'px';
    const duration = 8 + Math.random() * 10;
    el.style.animationDuration = duration + 's';
    el.style.animationDelay = (Math.random() * duration) + 's';
    field.appendChild(el);
  }

  // ---------- tabs ----------
  const tabBtns = document.querySelectorAll('.tab-btn');
  const editTab = document.getElementById('edit-tab');
  const generateTab = document.getElementById('generate-tab');
  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (btn.dataset.tab === 'edit') {
        editTab.classList.remove('hidden');
        generateTab.classList.add('hidden');
      } else {
        generateTab.classList.remove('hidden');
        editTab.classList.add('hidden');
      }
      resetResult();
    });
  });

  // ---------- API base ----------
  const API_BASE = "https://rocky-image-api-two.vercel.app";

  // ---------- elements ----------
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const dropzoneText = document.getElementById('dropzoneText');
  const statusEl = document.getElementById('status');
  const resultBox = document.getElementById('resultBox');
  const resultImg = document.getElementById('resultImg');
  let uploadedDataUrl = null;

  dropzone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      uploadedDataUrl = e.target.result;
      dropzoneText.innerHTML = `<img src="${uploadedDataUrl}" alt="preview"><br>Tap to change photo`;
    };
    reader.readAsDataURL(file);
  });

  function resetResult() {
    statusEl.textContent = '';
    resultBox.classList.add('hidden');
  }

  function setStatus(text) {
    statusEl.textContent = text;
  }

  // ---------- Edit action ----------
  document.getElementById('editBtn').addEventListener('click', async () => {
    const prompt = document.getElementById('editPrompt').value.trim();
    if (!uploadedDataUrl) { setStatus('💗 Please choose a photo first!'); return; }
    if (!prompt) { setStatus('💗 Please tell me what to change!'); return; }

    setStatus('🔄 Editing your photo, please wait...');
    resultBox.classList.add('hidden');

    try {
      const res = await fetch(`${API_BASE}/api/edit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, imageUrl: uploadedDataUrl })
      });

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        const detail = errData.details ? ` — ${JSON.stringify(errData.details)}` : '';
        throw new Error((errData.error || `Server error (${res.status})`) + detail);
      }

      const blob = await res.blob();
      resultImg.src = URL.createObjectURL(blob);
      resultBox.classList.remove('hidden');
      setStatus('✅ Done! Here is your edited photo 💕');

    } catch (err) {
      setStatus('❌ ' + err.message);
    }
  });

  // ---------- Generate action ----------
  document.getElementById('genBtn').addEventListener('click', async () => {
    const prompt = document.getElementById('genPrompt').value.trim();
    if (!prompt) { setStatus('💗 Please describe the image first!'); return; }

    setStatus('🔄 Creating your image, please wait...');
    resultBox.classList.add('hidden');

    try {
      const res = await fetch(`${API_BASE}/api/generate?prompt=${encodeURIComponent(prompt)}`);
      if (!res.ok) throw new Error(`Server error (${res.status})`);

      const blob = await res.blob();
      resultImg.src = URL.createObjectURL(blob);
      resultBox.classList.remove('hidden');
      setStatus('✅ Done! Here is your image 💕');

    } catch (err) {
      setStatus('❌ ' + err.message);
    }
  });
</script>

</body>
</html>
